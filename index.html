    <!-- Safe window.fetch patch to prevent errors from third-party libraries attempting to define fetch in restricted sandboxed/iframe environments -->
    <script>
      (function() {
        try {
          var proto = typeof Window !== 'undefined' ? Window.prototype : Object.getPrototypeOf(window);
          var desc = Object.getOwnPropertyDescriptor(proto, 'fetch');
          if (!desc) {
            proto = window;
            desc = Object.getOwnPropertyDescriptor(proto, 'fetch');
          }
          var currentFetch = window.fetch;
          if (desc) {
            if (!desc.set) {
              Object.defineProperty(proto, 'fetch', {
                configurable: true,
                enumerable: true,
                get: function() {
                  return currentFetch;
                },
                set: function(v) {
                  currentFetch = v;
                }
              });
            }
          } else {
            // Defensively define it if no descriptor was found
            Object.defineProperty(proto, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentFetch;
              },
              set: function(v) {
                currentFetch = v;
              }
            });
          }
        } catch (e) {
          console.warn("Could not patch fetch setter, attempting fallback...", e);
          try {
            var originalFetch = window.fetch;
            window.fetch = function() {
              return originalFetch.apply(this, arguments);
            };
          } catch (err) {}
        }
      })();
    </script>
    <!-- pdf.js for real-time document rendering with fallback -->
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js" 
            onerror="this.onerror=null; this.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';">
